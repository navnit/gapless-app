name: macOS release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Gapless version from pubspec.yaml
        required: true
        default: '0.1.0'
        type: string
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    environment:
      name: macos-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-14
          - target: macos-x64
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Require reviewed main revision
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            [ "$GITHUB_REF" = refs/heads/main ] || {
              echo '::error::Manual release candidates must run from main.'
              exit 1
            }
          else
            git fetch --no-tags origin main:refs/remotes/origin/main
            main_sha=$(git rev-parse origin/main^{commit})
            release_sha=$(git rev-parse "$GITHUB_SHA^{commit}")
            [ "$release_sha" = "$main_sha" ] || {
              echo '::error::Release tag must point to the fetched origin/main commit.'
              exit 1
            }
          fi
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.4
          cache: true
      - name: Resolve and validate release version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            release_version="$DISPATCH_VERSION"
          else
            release_version=${GITHUB_REF_NAME#v}
          fi
          dart run tool/release/validate_release_version.dart --release-version "$release_version"
          echo "value=$release_version" >> "$GITHUB_OUTPUT"
      - run: flutter pub get
      - run: dart run tool/engine/fetch_engine.dart
      - run: dart run tool/engine/fetch_engine.dart --verify-only
      - run: flutter analyze
      - run: flutter test
      - run: dart run tool/release/generate_sbom.dart
      - run: dart run tool/testing/generate_fixture_video.dart build/smoke/source.avi
      - run: flutter build macos --release
      - run: dart run tool/release/generate_sbom.dart --bundle build/macos/Build/Products/Release/Gapless.app --output build/macos/Build/Products/Release/Gapless.app/Contents/Resources/compliance/sbom.spdx.json --target "${{ matrix.target }}" --phase pre-sign-embedded
      - name: Ad hoc sign and package DMG
        run: packaging/macos/package_dmg.sh build/macos/Build/Products/Release/Gapless.app "build/Gapless-${{ steps.version.outputs.value }}-${{ matrix.target }}-UNNOTARIZED.dmg"
      - name: Generate and verify final app SBOM
        run: |
          dart run tool/release/generate_sbom.dart --bundle build/macos/Build/Products/Release/Gapless.app --output "build/sbom-${{ matrix.target }}.spdx.json" --target "${{ matrix.target }}" --phase post-sign-external
          dart run tool/release/verify_bundle.dart --bundle build/macos/Build/Products/Release/Gapless.app --target "${{ matrix.target }}" --sbom "build/sbom-${{ matrix.target }}.spdx.json"
      - name: Smoke test installed macOS DMG
        run: |
          dmg="build/Gapless-${{ steps.version.outputs.value }}-${{ matrix.target }}-UNNOTARIZED.dmg"
          mount="$RUNNER_TEMP/gapless-mounted"
          mkdir -p "$mount"
          hdiutil attach "$dmg" -nobrowse -mountpoint "$mount"
          trap 'hdiutil detach "$mount"' EXIT
          "$mount/Gapless.app/Contents/MacOS/Gapless" --smoke-test "$GITHUB_WORKSPACE/build/smoke/source.avi" "$RUNNER_TEMP/installed-output.mp4"
          dart run tool/release/verify_bundle.dart --bundle "$mount/Gapless.app" --target "${{ matrix.target }}" --sbom "$GITHUB_WORKSPACE/build/sbom-${{ matrix.target }}.spdx.json"
      - run: flutter test integration_test/editor_workflow_test.dart -d macos
      - run: flutter test integration_test/recovery_workflow_test.dart -d macos
      - name: Checksums and source material
        run: |
          cd build
          shasum -a 256 "Gapless-${{ steps.version.outputs.value }}-${{ matrix.target }}-UNNOTARIZED.dmg" > "SHA256SUMS-${{ matrix.target }}"
          cp ../docs/building.md .
          cp ../third_party/THIRD_PARTY_NOTICES.md .
          cp ../third_party/SOURCE_OFFER.md .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: |
            build/Gapless-${{ steps.version.outputs.value }}-${{ matrix.target }}-UNNOTARIZED.dmg
            build/SHA256SUMS-${{ matrix.target }}
            build/building.md
            build/THIRD_PARTY_NOTICES.md
            build/SOURCE_OFFER.md
            build/sbom-${{ matrix.target }}.spdx.json

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    environment:
      name: macos-release
    steps:
      - name: Refuse an existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          status=$(curl --silent --show-error \
            --output "$RUNNER_TEMP/release-preflight.json" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")
          case "$status" in
            404) ;;
            200)
              echo '::error::A GitHub Release already exists for this tag.'
              exit 1
              ;;
            *)
              echo "::error::Release preflight failed with HTTP $status."
              exit 1
              ;;
          esac
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          pattern: macos-*
          merge-multiple: true
      - name: Consolidate checksums
        run: |
          cat artifacts/SHA256SUMS-* | sort -k 2 > artifacts/SHA256SUMS
          rm artifacts/SHA256SUMS-*
      - name: Publish public GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.ref_name }}
          name: Gapless ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: false
          body: |
            ## Unnotarized macOS build — read before installing

            These macOS DMGs are ad hoc signed but **not notarized by Apple** and
            have **not been reviewed by Apple**. Artifacts are marked `UNNOTARIZED`.

            On first launch macOS Gatekeeper will block the app. To open it, go to
            **System Settings > Privacy & Security**, scroll to Security, and click
            **Open Anyway**, then confirm. Each new version may require this again.

            Verify your download against `SHA256SUMS`. Build instructions
            (`building.md`), third-party notices, and the source offer are attached
            to this release; source code is at https://github.com/navnit/gapless.
          files: artifacts/*
